# =============================================================================
# PT Chatbot — Nginx Config
# =============================================================================

limit_req_zone $binary_remote_addr zone=pt_api_limit:10m rate=20r/s;

upstream pt_backend {
    server 127.0.0.1:8003;
    keepalive 32;
    keepalive_time 1h;
    keepalive_requests 500;
}

server {
    listen 80;
    server_name chat.pendakwah.tech;

    root /var/www/pt-chatbot/public;
    index index.html;

    access_log /var/log/nginx/pt-chatbot.access.log;
    error_log  /var/log/nginx/pt-chatbot.error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/javascript application/json application/javascript;

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API: Chat
    location /api/chat {
        limit_req zone=pt_api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://pt_backend/api/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 180s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 64k;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # API: Chat Stream (SSE)
    location /api/chat/stream {
        limit_req zone=pt_api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://pt_backend/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        add_header Cache-Control "no-store";
        add_header Content-Type "text/event-stream";
    }

    # API: Health
    location /api/health {
        proxy_pass http://pt_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # API: Mode info
    location /api/mode {
        proxy_pass http://pt_backend/api/mode;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API: Cache
    location /api/cache {
        proxy_pass http://pt_backend/api/cache;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API: Feedback
    location /api/feedback {
        proxy_pass http://pt_backend/api/feedback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # Security
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|\.svn) {
        deny all;
        return 404;
    }
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
